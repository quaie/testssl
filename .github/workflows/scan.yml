name: SSL/TLS Scan

on:
  push:
    paths:
      - domains.txt
  schedule:
    - cron: '0 6 * * 1'  # every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install sslyze
        run: pip install -r requirements.txt

      - name: Run sslyze scans
        run: |
          python - <<'EOF'
          import json
          import socket
          import datetime
          from pathlib import Path

          from sslyze import Scanner, ServerNetworkLocation, ServerScanRequest, ScanCommand

          PROTOCOL_ATTRS = [
              ("SSL 2.0", "ssl_2_0_cipher_suites"),
              ("SSL 3.0", "ssl_3_0_cipher_suites"),
              ("TLS 1.0", "tls_1_0_cipher_suites"),
              ("TLS 1.1", "tls_1_1_cipher_suites"),
              ("TLS 1.2", "tls_1_2_cipher_suites"),
              ("TLS 1.3", "tls_1_3_cipher_suites"),
          ]

          def resolve_ip(hostname: str, family: socket.AddressFamily) -> str:
              try:
                  results = socket.getaddrinfo(hostname, None, family)
                  return results[0][4][0] if results else ""
              except socket.gaierror:
                  return ""

          def scan_domain(hostname: str) -> dict:
              scanned_at = datetime.datetime.now(datetime.timezone.utc).isoformat()
              entry = {
                  "domain": hostname,
                  "ip_v4": resolve_ip(hostname, socket.AF_INET),
                  "ip_v6": resolve_ip(hostname, socket.AF_INET6),
                  "tls_versions": [],
                  "ciphers": [],
                  "scanned_at": scanned_at,
                  "error": None,
              }

              try:
                  request = ServerScanRequest(
                      server_location=ServerNetworkLocation(hostname=hostname, port=443),
                      scan_commands={
                          ScanCommand.SSL_2_0_CIPHER_SUITES,
                          ScanCommand.SSL_3_0_CIPHER_SUITES,
                          ScanCommand.TLS_1_0_CIPHER_SUITES,
                          ScanCommand.TLS_1_1_CIPHER_SUITES,
                          ScanCommand.TLS_1_2_CIPHER_SUITES,
                          ScanCommand.TLS_1_3_CIPHER_SUITES,
                      },
                  )
                  scanner = Scanner()
                  scanner.queue_scans([request])

                  for result in scanner.get_results():
                      if result.connectivity_error_trace:
                          entry["error"] = str(result.connectivity_error_trace)
                          return entry

                      for version_name, attr in PROTOCOL_ATTRS:
                          obj = getattr(result.scan_result, attr, None)
                          if obj is None or obj.status.name != "COMPLETED":
                              continue
                          if obj.result.accepted_cipher_suites:
                              entry["tls_versions"].append(version_name)
                              entry["ciphers"].append({
                                  version_name: [
                                      suite.cipher_suite.name
                                      for suite in obj.result.accepted_cipher_suites
                                  ]
                              })

              except Exception as exc:
                  entry["error"] = str(exc)

              return entry

          domains = [
              line.strip()
              for line in Path("domains.txt").read_text().splitlines()
              if line.strip() and not line.startswith("#")
          ]

          results = []
          for domain in domains:
              print(f"Scanning {domain}...")
              results.append(scan_domain(domain))

          Path("scan.json").write_text(json.dumps(results, indent=2))
          print(f"Wrote scan.json with {len(results)} entries.")
          EOF

      - name: Commit scan results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scan.json
          git diff --cached --quiet || git commit -m "chore: update scan.json [skip ci]"
          git push
