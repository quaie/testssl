name: 'TestSSL Domains Scanner'
description: 'Scans domains from domains.txt with testssl.sh, extracts key metrics, saves as JSON array'
inputs:
  domains-file:
    description: 'Path to domains file'
    required: true
    default: 'domains.txt'
  output-file:
    description: 'Output JSON file path'
    required: true
    default: 'testssl-results.json'
  scan-timeout:
    description: 'Timeout per domain (seconds)'
    required: false
    default: '60'
runs:
  using: 'composite'
  steps:
    - name: Download testssl.sh
      shell: bash
      run: |
        curl -s https://testssl.sh/testssl.sh -o testssl.sh
        chmod +x testssl.sh

    - name: Scan domains and generate JSON
      shell: bash
      run: |
        chmod +x "${{ github.action_path }}/scan-domains.sh"
        "${{ github.action_path }}/scan-domains.sh" \
          --domains "${{ inputs.domains-file }}" \
          --output "${{ inputs.output-file }}" \
          --timeout "${{ inputs.scan-timeout }}"
